spring:
  datasource:
    url: jdbc:mysql://${NLOGIN_DB_HOST:127.0.0.1}:${NLOGIN_DB_PORT:3306}/${NLOGIN_DB_NAME:s645_nlogin_test}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driverClassName: "com.mysql.cj.jdbc.Driver"
    username: ${NLOGIN_DB_USER}
    password: ${NLOGIN_DB_PASSWORD}
    hikari:
      maximum-pool-size: ${NLOGIN_DB_POOL_SIZE:5}
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:true}

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:3600}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:36000}

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173}

logging:
  level:
    root: INFO
    me.ihqqq.auth: DEBUG